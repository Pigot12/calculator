<!DOCTYPE html>
<html>
<head>

<script type="module" src="main.js" defer></script>

<meta charset="utf-8">
<title>Calculator(tutorial)</title>

<body>
<div class="calculator-grid">
    <div class="output">
        <div data-previous-operand class="previous-operand">123</div>
        <div data-current-operand class="current-operand">456</div>
    </div>
    <!-- Γράφουμε τα buttons χώρις κάποιο class γιατί θα χρησιμοποιήσουμε το grid display-->
    <button data-all-clean class="span-two">AC</button>
    <button data-delete>DEL</button>
    <button data-operation>:</button>
    <button data-number>1</button>
    <button data-number>2</button>
    <button data-number>3</button>
    <button>*</button>
    <button data-number>4</button>
    <button data-number>5</button>
    <button data-number>6</button>
    <button data-operation>+</button>
    <button data-number>7</button>
    <button data-number>8</button>
    <button data-number>9</button>
    <button>-</button>
    <button data-number>.</button>
    <button data-number>0</button>
    <button data-equals class="span-two">=</button>
</div>

</body>
<p>d</p>
<p>Change</p>
